<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>代購サービス</title>
</head>
<body>

  <h1>代購サービス</h1>

  <input id="linkInput" placeholder="1688リンクを貼り付け" style="width:300px;">
  <br><br>
  <button onclick="submitData()">取得</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabase = window.supabase.createClient(
      "https://cqiglrncwircuyuhtxgp.supabase.co", // 填入你的 Supabase URL
      "sb_publishable_uerGfSIuVBhNTn_jX9p4fw_MFeBIG-1" // 填入你的 Supabase API Key
    );

    async function submitData() {
      const link = document.getElementById("linkInput").value;
      
      if (!link) {
        alert("请先输入 1688 URL");
        return;
      }

      const { data, error } = await supabase
        .from("orders")
        .insert([{ link: link }]);

      if (error) {
        alert("提交失败，请检查 URL 或稍后再试");
        console.log(error);
      } else {
        alert("提交成功！");
      }
    }
  </script>

</body>
</html>
