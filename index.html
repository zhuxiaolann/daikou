<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>代購サービス</title>
</head>
<body>

  <h1>代購サービス</h1>

  <input id="linkInput" placeholder="1688リンクを貼り付け" style="width:300px;">
  <br><br>
  <button onclick="submitData()">取得</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabase = window.supabase.createClient(
      "https://cqiglrncwircuyuhtxgp.supabase.co",
      "sb_publishable_uerGfSIuVBhNTn_jX9p4fw_MFeBIG-1"
    );

    async function submitData() {
      const link = document.getElementById("linkInput").value;

      const { error } = await supabase
        .from("orders")
        .insert([{ link: link }]);

      if (error) {
        alert("失败");
        console.log(error);
      } else {
        alert("成功！");
      }
    }
  </script>

</body>
</html>
