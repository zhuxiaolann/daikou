
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>代購サービス</title>
</head>
<body>

<h1>代購サービス</h1>

<input id="linkInput" style="width:300px;" placeholder="1688リンクを貼り付け">
<br><br>
<button onclick="submitData()">取得</button>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  // ⚠️ 这里只能有一次！
  const supabase = createClient(
    "https://cqiglrncwircuyuhtxgp.supabase.co",
    "sb_publishable_uerGfSIuVBhNTn_jX9p4fw_MFeBIG-1"
  )

  // ⚠️ 必须挂到 window，否则按钮找不到
  window.submitData = async function () {
    const link = document.getElementById("linkInput").value

    if (!link) {
      alert("请输入链接")
      return
    }

    const { error } = await supabase
      .from("orders")
      .insert([{ link: link }])

    if (error) {
      console.log(error)
      alert("失败")
    } else {
      alert("成功！")
    }
  }
</script>

</body>
</html>
